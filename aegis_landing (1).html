<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEGIS SYSTEM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#fff;font-family:'Pretendard',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;font-weight:300;letter-spacing:-0.04em;}

/* ═══════════════════════════════════ */
/*  LOADING SEQUENCE                  */
/* ═══════════════════════════════════ */
.ld-screen{position:fixed;inset:0;background:#000;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease, filter 0.8s ease;}
.ld-screen.hide{opacity:0;filter:blur(10px);pointer-events:none;}

/* Scan lines overlay */
.ld-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);pointer-events:none;z-index:1;}

/* Logo container */
.ld-logo-wrap{position:relative;display:flex;flex-direction:column;align-items:center;z-index:2;}

/* Logo with glow */
.ld-logo{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;letter-spacing:16px;color:transparent;position:relative;opacity:0;animation:logoReveal 1.5s cubic-bezier(.25,.8,.25,1) 0.5s forwards;}
.ld-logo::before{content:'ARCH';position:absolute;inset:0;background:linear-gradient(135deg,#fff 0%,#888 40%,#fff 60%,#666 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.ld-logo::after{content:'ARCH';position:absolute;inset:0;color:#fff;filter:blur(20px);opacity:0;animation:logoGlow 2s ease-in-out 1.5s forwards;}

@keyframes logoReveal{
  0%{opacity:0;letter-spacing:40px;filter:blur(8px);}
  50%{opacity:1;filter:blur(2px);}
  100%{opacity:1;letter-spacing:16px;filter:blur(0);}
}
@keyframes logoGlow{
  0%{opacity:0;filter:blur(20px);}
  50%{opacity:0.4;filter:blur(30px);}
  100%{opacity:0.15;filter:blur(25px);}
}

/* Horizontal light sweep across logo */
.ld-sweep{position:absolute;top:-20%;left:-100%;width:60%;height:140%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transform:skewX(-20deg);animation:sweep 2s ease-in-out 1.8s forwards;pointer-events:none;}
@keyframes sweep{0%{left:-100%;}100%{left:200%;}}

/* Decorative lines around logo */
.ld-line-l,.ld-line-r{position:absolute;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));opacity:0;transform:translateY(-50%);}
.ld-line-l{right:calc(100% + 20px);width:120px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));animation:lineIn 0.8s ease 1.2s forwards;}
.ld-line-r{left:calc(100% + 20px);width:120px;background:linear-gradient(270deg,transparent,rgba(255,255,255,0.4));animation:lineIn 0.8s ease 1.2s forwards;}
@keyframes lineIn{0%{opacity:0;width:0;}100%{opacity:1;width:120px;}}

/* Diamond accents */
.ld-diamond-l,.ld-diamond-r{position:absolute;top:50%;width:6px;height:6px;background:#fff;transform:translateY(-50%) rotate(45deg);opacity:0;animation:diamondIn 0.5s ease 1.8s forwards;}
.ld-diamond-l{right:calc(100% + 145px);}
.ld-diamond-r{left:calc(100% + 145px);}
@keyframes diamondIn{0%{opacity:0;transform:translateY(-50%) rotate(45deg) scale(0);}100%{opacity:0.6;transform:translateY(-50%) rotate(45deg) scale(1);}}

/* Subtitle */
.ld-subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:8px;color:#666;margin-top:16px;opacity:0;animation:fadeUp 0.8s ease 1.6s forwards;text-transform:uppercase;}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}

/* System messages */
.ld-sys{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:#444;margin-top:40px;text-transform:uppercase;opacity:0;animation:fadeUp 0.6s ease 2s forwards;min-height:16px;transition:color 0.3s;}

/* Progress bar */
.ld-progress{width:200px;height:2px;background:#111;margin-top:20px;position:relative;overflow:hidden;opacity:0;animation:fadeUp 0.6s ease 2s forwards;}
.ld-progress-fill{position:absolute;top:0;left:0;height:100%;width:0;background:linear-gradient(90deg,#333,#fff);animation:progressFill 2.5s ease 2.2s forwards;}
.ld-progress-glow{position:absolute;top:-4px;right:0;width:20px;height:10px;background:radial-gradient(ellipse,rgba(255,255,255,0.6),transparent);filter:blur(2px);opacity:0;}
@keyframes progressFill{0%{width:0;}30%{width:40%;}60%{width:65%;}85%{width:90%;}100%{width:100%;}}

/* Percentage */
.ld-percent{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:500;color:#333;margin-top:10px;letter-spacing:3px;opacity:0;animation:fadeUp 0.6s ease 2s forwards;}

/* Corner brackets */
.ld-corner{position:absolute;width:30px;height:30px;pointer-events:none;opacity:0;animation:cornerIn 0.6s ease 1s forwards;}
.ld-corner::before,.ld-corner::after{content:'';position:absolute;background:rgba(255,255,255,0.12);}
.lc-tl{top:25%;left:30%;}.lc-tl::before{top:0;left:0;width:30px;height:1px;}.lc-tl::after{top:0;left:0;width:1px;height:30px;}
.lc-tr{top:25%;right:30%;}.lc-tr::before{top:0;right:0;width:30px;height:1px;}.lc-tr::after{top:0;right:0;width:1px;height:30px;}
.lc-bl{bottom:25%;left:30%;}.lc-bl::before{bottom:0;left:0;width:30px;height:1px;}.lc-bl::after{bottom:0;left:0;width:1px;height:30px;}
.lc-br{bottom:25%;right:30%;}.lc-br::before{bottom:0;right:0;width:30px;height:1px;}.lc-br::after{bottom:0;right:0;width:1px;height:30px;}
@keyframes cornerIn{0%{opacity:0;}100%{opacity:1;}}

/* Particle burst */
.ld-particles{position:absolute;width:400px;height:400px;pointer-events:none;z-index:0;}
.ld-particle{position:absolute;background:#fff;border-radius:50%;opacity:0;}
.ld-particle:nth-child(1){width:2px;height:2px;top:50%;left:50%;animation:particleBurst 2s ease-out 1.5s forwards;}
.ld-particle:nth-child(2){width:1.5px;height:1.5px;top:50%;left:50%;animation:particleBurst2 2.2s ease-out 1.6s forwards;}
.ld-particle:nth-child(3){width:1px;height:1px;top:50%;left:50%;animation:particleBurst3 1.8s ease-out 1.7s forwards;}
.ld-particle:nth-child(4){width:2px;height:2px;top:50%;left:50%;animation:particleBurst4 2.4s ease-out 1.5s forwards;}
.ld-particle:nth-child(5){width:1px;height:1px;top:50%;left:50%;animation:particleBurst5 2s ease-out 1.8s forwards;}
.ld-particle:nth-child(6){width:1.5px;height:1.5px;top:50%;left:50%;animation:particleBurst6 2.1s ease-out 1.6s forwards;}
@keyframes particleBurst{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.8;}100%{opacity:0;transform:translate(150px,-80px);}}
@keyframes particleBurst2{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.6;}100%{opacity:0;transform:translate(-120px,-100px);}}
@keyframes particleBurst3{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.7;}100%{opacity:0;transform:translate(80px,120px);}}
@keyframes particleBurst4{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.5;}100%{opacity:0;transform:translate(-160px,60px);}}
@keyframes particleBurst5{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.8;}100%{opacity:0;transform:translate(100px,90px);}}
@keyframes particleBurst6{0%{opacity:0;transform:translate(0,0);}20%{opacity:0.6;}100%{opacity:0;transform:translate(-90px,-130px);}}

/* ═══════════════════════════════════ */
/*  MAIN CONTENT                      */
/* ═══════════════════════════════════ */
.stardust{position:fixed;inset:-50%;width:200%;height:200%;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%,rgba(255,255,255,1),transparent),
    radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.8),transparent),
    radial-gradient(2px 2px at 60% 20%,rgba(255,255,255,1),transparent),
    radial-gradient(1.5px 1.5px at 80% 80%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.5px 1.5px at 70% 50%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 50% 90%,rgba(255,255,255,.9),transparent),
    radial-gradient(2px 2px at 85% 10%,rgba(255,255,255,.7),transparent);
  background-size:450px 450px;
  animation:dust-drift 80s linear infinite,dust-twinkle 5s ease-in-out infinite alternate;}
@keyframes dust-drift{0%{transform:translateY(0)}100%{transform:translateY(300px)}}
@keyframes dust-twinkle{0%{opacity:.15}100%{opacity:.8}}

.amb{position:fixed;border-radius:50%;filter:blur(120px);mix-blend-mode:screen;pointer-events:none;z-index:0;animation:pulse 20s ease-in-out infinite alternate;}
.amb-1{top:20%;left:25%;width:300px;height:300px;background:#fff;opacity:.03;}
.amb-2{bottom:20%;right:20%;width:350px;height:350px;background:#ccc;opacity:.025;animation-delay:-7s;}
@keyframes pulse{0%{transform:scale(.9);opacity:.02}100%{transform:translate(30px,20px) scale(1.1);opacity:.05}}

.main{position:relative;z-index:10;width:440px;max-width:92vw;opacity:0;transform:translateY(30px) scale(0.98);transition:all 1s cubic-bezier(.25,.8,.25,1);}
.main.show{opacity:1;transform:translateY(0) scale(1);}

.header{text-align:center;margin-bottom:48px;}
.logo-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.logo{font-family:'Orbitron',sans-serif;font-size:56px;font-weight:900;letter-spacing:12px;position:relative;line-height:1;}
.logo::before{content:'ARCH';background:linear-gradient(135deg,#fff 0%,#999 30%,#fff 50%,#777 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.logo::after{content:'ARCH';position:absolute;inset:0;color:#fff;filter:blur(20px);opacity:0.08;}
.logo-line-l,.logo-line-r{position:absolute;top:50%;height:1px;transform:translateY(-50%);}
.logo-line-l{right:calc(100% + 16px);width:60px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2));}
.logo-line-r{left:calc(100% + 16px);width:60px;background:linear-gradient(270deg,transparent,rgba(255,255,255,0.2));}

.subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:6px;color:#666;text-transform:uppercase;margin-bottom:16px;}
.sys-msg{font-family:'IBM Plex Mono',monospace;font-size:8px;color:#444;opacity:.5;letter-spacing:2px;text-transform:uppercase;}

.auth{border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:40px 36px;position:relative;}
.auth::before,.auth::after{content:'';position:absolute;width:16px;height:16px;pointer-events:none;}
.auth::before{top:-1px;left:-1px;border-top:1px solid rgba(255,255,255,.15);border-left:1px solid rgba(255,255,255,.15);}
.auth::after{bottom:-1px;right:-1px;border-bottom:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);}

.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:1px solid rgba(255,255,255,.06);}
.tab{flex:1;background:none;border:none;color:#555;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;padding:12px 0;cursor:pointer;transition:.3s;text-transform:uppercase;position:relative;}
.tab:hover{color:#fff;}
.tab.active{color:#fff;}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fff,transparent);}

.form{display:flex;flex-direction:column;gap:20px;}
.form.hide{display:none;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;letter-spacing:3px;color:#555;text-transform:uppercase;}
.field-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:#fff;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:300;padding:10px 0;outline:none;transition:.4s;letter-spacing:-0.02em;}
.field-input:focus{border-bottom-color:#fff;box-shadow:0 8px 16px -12px rgba(255,255,255,.1);}
.field-input::placeholder{color:rgba(255,255,255,.1);font-family:'IBM Plex Mono',monospace;font-size:10px;}

.submit{width:100%;background:transparent;border:1px solid rgba(255,255,255,.12);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:4px;padding:16px;cursor:pointer;transition:.4s;text-transform:uppercase;margin-top:8px;position:relative;overflow:hidden;}
.submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);transition:0.6s;}
.submit:hover{border-color:rgba(255,255,255,.3);}
.submit:hover::before{left:100%;}

.msg{font-family:'IBM Plex Mono',monospace;font-size:10px;text-align:center;margin-top:12px;min-height:16px;transition:.3s;letter-spacing:1px;}
.msg.error{color:#ff4466;}
.msg.ok{color:#66ffaa;}

.browse{text-align:center;margin-top:28px;}
.browse a{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#444;letter-spacing:3px;text-decoration:none;text-transform:uppercase;transition:.3s;opacity:.5;}
.browse a:hover{color:#fff;opacity:1;}

.footer{text-align:center;margin-top:40px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:#333;letter-spacing:3px;text-transform:uppercase;}

.spinner{display:none;text-align:center;padding:20px;}
.spinner.show{display:block;}
.spinner::after{content:'';display:inline-block;width:6px;height:6px;background:#fff;transform:rotate(45deg);animation:sp 1s ease-in-out infinite;}
@keyframes sp{0%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(225deg) scale(.6);opacity:.3}100%{transform:rotate(405deg) scale(1);opacity:1}}

@media(max-width:500px){
  .logo{font-size:40px;letter-spacing:8px;}
  .subtitle{font-size:9px;letter-spacing:4px;}
  .auth{padding:28px 24px;}
  .field-input{font-size:16px;}
  .ld-logo{font-size:48px;letter-spacing:10px;}
}
</style>
</head>
<body>

<!-- ═══ LOADING SEQUENCE ═══ -->
<div class="ld-screen" id="ldScreen">
    <div class="ld-scanlines"></div>
    <div class="ld-corner lc-tl"></div>
    <div class="ld-corner lc-tr"></div>
    <div class="ld-corner lc-bl"></div>
    <div class="ld-corner lc-br"></div>
    
    <div class="ld-particles">
        <div class="ld-particle"></div><div class="ld-particle"></div>
        <div class="ld-particle"></div><div class="ld-particle"></div>
        <div class="ld-particle"></div><div class="ld-particle"></div>
    </div>
    
    <div class="ld-logo-wrap">
        <div class="ld-line-l"></div>
        <div class="ld-line-r"></div>
        <div class="ld-diamond-l"></div>
        <div class="ld-diamond-r"></div>
        <div class="ld-logo">ARCH</div>
        <div class="ld-sweep"></div>
        <div class="ld-subtitle">AEGIS SYSTEM</div>
    </div>
    
    <div class="ld-sys" id="ldSys">INITIALIZING SYSTEM PROTOCOL</div>
    <div class="ld-progress"><div class="ld-progress-fill"></div></div>
    <div class="ld-percent" id="ldPercent">0%</div>
</div>

<!-- ═══ BACKGROUND ═══ -->
<div class="stardust"></div>
<div class="amb amb-1"></div>
<div class="amb amb-2"></div>

<!-- ═══ MAIN ═══ -->
<div class="main" id="main">
    <div class="header">
        <div class="logo-wrap">
            <div class="logo-line-l"></div>
            <div class="logo-line-r"></div>
            <div class="logo">ARCH</div>
        </div>
        <div class="subtitle">AEGIS SYSTEM</div>
        <div class="sys-msg">AGENT PROFILE ARCHIVE // CLASSIFIED NETWORK</div>
    </div>

    <div class="auth">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">ACCESS</button>
            <button class="tab" onclick="switchTab('signup')">REGISTER</button>
        </div>
        <div class="form" id="loginForm">
            <div class="field"><div class="field-label">EMAIL</div><input class="field-input" type="email" id="loginEmail" placeholder="agent@aegis-system.cloud"></div>
            <div class="field"><div class="field-label">PASSWORD</div><input class="field-input" type="password" id="loginPw" placeholder="••••••••"></div>
            <button class="submit" onclick="handleLogin()">CONNECT</button>
            <div class="spinner" id="loginSpinner"></div>
            <div class="msg" id="loginMsg"></div>
        </div>
        <div class="form hide" id="signupForm">
            <div class="field"><div class="field-label">EMAIL</div><input class="field-input" type="email" id="signupEmail" placeholder="agent@aegis-system.cloud"></div>
            <div class="field"><div class="field-label">PASSWORD</div><input class="field-input" type="password" id="signupPw" placeholder="6자 이상"></div>
            <div class="field"><div class="field-label">CODENAME <span style="opacity:.4;font-size:7px;">닉네임</span></div><input class="field-input" type="text" id="signupNick" placeholder="Your agent codename"></div>
            <button class="submit" onclick="handleSignup()">INITIALIZE</button>
            <div class="spinner" id="signupSpinner"></div>
            <div class="msg" id="signupMsg"></div>
        </div>
    </div>
    <div class="browse"><a href="#">BROWSE AS VISITOR ›</a></div>
    <div class="footer">© 2026 AEGIS SYSTEM</div>
</div>

<script>
// ═══ Loading Sequence ═══
const sysMessages = [
    {text:'INITIALIZING SYSTEM PROTOCOL', t:0},
    {text:'LOADING AGENT DATABASE', t:800},
    {text:'ESTABLISHING SECURE CONNECTION', t:1600},
    {text:'DECRYPTING PROFILE ARCHIVES', t:2400},
    {text:'SYNCHRONIZING MODULES', t:3200},
    {text:'SYSTEM ONLINE — WELCOME', t:4000},
];
sysMessages.forEach(s=>{
    setTimeout(()=>{document.getElementById('ldSys').textContent=s.text;},s.delay||s.t);
});

// Percentage counter
let pct=0;
const pctEl=document.getElementById('ldPercent');
const pctInterval=setInterval(()=>{
    pct+=Math.random()*3+1;
    if(pct>=100){pct=100;clearInterval(pctInterval);}
    pctEl.textContent=Math.floor(pct)+'%';
},80);

// Transition to main
setTimeout(()=>{
    document.getElementById('ldScreen').classList.add('hide');
    setTimeout(()=>{document.getElementById('main').classList.add('show');},400);
},4800);

// ═══ Tab Switch ═══
function switchTab(tab){
    document.querySelectorAll('.tab').forEach((t,i)=>{
        t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('loginForm').classList.toggle('hide',tab!=='login');
    document.getElementById('signupForm').classList.toggle('hide',tab!=='signup');
    document.querySelectorAll('.msg').forEach(m=>m.textContent='');
}

// ═══ Auth (Demo) ═══
async function handleLogin(){
    const email=document.getElementById('loginEmail').value.trim();
    const pw=document.getElementById('loginPw').value;
    const msg=document.getElementById('loginMsg');
    if(!email||!pw){msg.className='msg error';msg.textContent='INPUT REQUIRED';return;}
    document.getElementById('loginSpinner').classList.add('show');
    setTimeout(()=>{
        document.getElementById('loginSpinner').classList.remove('show');
        msg.className='msg ok';msg.textContent='CONNECTION ESTABLISHED';
        setTimeout(()=>{msg.textContent='[ DEMO — SUPABASE 미연동 ]';msg.className='msg';},1500);
    },1000);
}
async function handleSignup(){
    const email=document.getElementById('signupEmail').value.trim();
    const pw=document.getElementById('signupPw').value;
    const nick=document.getElementById('signupNick').value.trim();
    const msg=document.getElementById('signupMsg');
    if(!email||!pw||!nick){msg.className='msg error';msg.textContent='ALL FIELDS REQUIRED';return;}
    if(pw.length<6){msg.className='msg error';msg.textContent='PASSWORD: MIN 6 CHARACTERS';return;}
    document.getElementById('signupSpinner').classList.add('show');
    setTimeout(()=>{
        document.getElementById('signupSpinner').classList.remove('show');
        msg.className='msg ok';msg.textContent='AGENT REGISTERED — CHECK EMAIL';
        setTimeout(()=>{msg.textContent='[ DEMO — SUPABASE 미연동 ]';msg.className='msg';},1500);
    },1000);
}
document.querySelectorAll('.field-input').forEach(input=>{
    input.addEventListener('keydown',e=>{if(e.key==='Enter')input.closest('.form').querySelector('.submit').click();});
});
</script>
</body>
</html>
