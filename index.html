<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEGIS SYSTEM</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--c1:#ffffff;--c2:#cccccc;--c3:#888888;--c4:#030305;--c5:#0a0a0f;}
body{background:var(--c4);color:var(--c1);font-family:'Pretendard',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;font-weight:300;letter-spacing:-0.04em;}

/* ═══ LOADING ═══ */
.ld{position:fixed;inset:0;background:#000;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;}
.ld.hide{opacity:0;pointer-events:none;}
.ld-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:10px;color:#333;margin-bottom:32px;}
.ld-text{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;transition:color 0.3s;}
.ld-bar{width:180px;height:1px;background:#1a1a1a;position:relative;overflow:hidden;}
.ld-bar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:linear-gradient(to right,transparent,#fff,transparent);animation:ldSlide 1.2s ease-in-out infinite;}
@keyframes ldSlide{0%{left:-100%}100%{left:100%}}

/* ═══ STARDUST ═══ */
.stardust{position:fixed;inset:-50%;width:200%;height:200%;pointer-events:none;z-index:0;opacity:.6;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%,rgba(255,255,255,1),transparent),
    radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.8),transparent),
    radial-gradient(2px 2px at 60% 20%,rgba(255,255,255,1),transparent),
    radial-gradient(1.5px 1.5px at 80% 80%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.5px 1.5px at 70% 50%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 50% 90%,rgba(255,255,255,.9),transparent),
    radial-gradient(2px 2px at 85% 10%,rgba(255,255,255,.7),transparent);
  background-size:450px 450px;
  animation:dust-drift 80s linear infinite,dust-twinkle 5s ease-in-out infinite alternate;}
@keyframes dust-drift{0%{transform:translateY(0)}100%{transform:translateY(300px)}}
@keyframes dust-twinkle{0%{opacity:.15}100%{opacity:.8}}

/* ═══ AMBIENT BLOBS ═══ */
.amb{position:fixed;border-radius:50%;filter:blur(120px);mix-blend-mode:screen;pointer-events:none;z-index:0;animation:pulse 20s ease-in-out infinite alternate;}
.amb-1{top:20%;left:25%;width:300px;height:300px;background:var(--c1);opacity:.03;}
.amb-2{bottom:20%;right:20%;width:350px;height:350px;background:var(--c2);opacity:.025;animation-delay:-7s;}
@keyframes pulse{0%{transform:scale(.9);opacity:.02}100%{transform:translate(30px,20px) scale(1.1);opacity:.05}}

/* ═══ MAIN CONTENT ═══ */
.main{position:relative;z-index:10;width:440px;max-width:92vw;opacity:0;transform:translateY(20px);transition:all 0.8s cubic-bezier(.25,.8,.25,1);}
.main.show{opacity:1;transform:translateY(0);}

/* Header */
.header{text-align:center;margin-bottom:48px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:12px;color:var(--c1);line-height:1;margin-bottom:8px;text-shadow:0 0 60px rgba(255,255,255,.08);}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:6px;color:var(--c3);text-transform:uppercase;margin-bottom:16px;}
.sys-msg{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--c3);opacity:.5;letter-spacing:2px;text-transform:uppercase;}

/* Auth card */
.auth{border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:40px 36px;position:relative;}
.auth::before,.auth::after{content:'';position:absolute;width:16px;height:16px;pointer-events:none;}
.auth::before{top:-1px;left:-1px;border-top:1px solid rgba(255,255,255,.2);border-left:1px solid rgba(255,255,255,.2);}
.auth::after{bottom:-1px;right:-1px;border-bottom:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1);}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:1px solid rgba(255,255,255,.06);}
.tab{flex:1;background:none;border:none;color:var(--c3);font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;padding:12px 0;cursor:pointer;transition:.3s;text-transform:uppercase;position:relative;}
.tab:hover{color:var(--c1);}
.tab.active{color:var(--c1);}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c1),transparent);}

/* Form */
.form{display:flex;flex-direction:column;gap:20px;}
.form.hide{display:none;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;letter-spacing:3px;color:var(--c3);text-transform:uppercase;}
.field-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:var(--c1);font-family:'Pretendard',sans-serif;font-size:14px;font-weight:300;padding:10px 0;outline:none;transition:.4s;letter-spacing:-0.02em;}
.field-input:focus{border-bottom-color:var(--c1);box-shadow:0 8px 16px -12px rgba(255,255,255,.15);}
.field-input::placeholder{color:rgba(255,255,255,.12);font-family:'IBM Plex Mono',monospace;font-size:10px;}

/* Nickname field (signup only) */
.nick-field{display:flex;flex-direction:column;gap:6px;}

/* Submit */
.submit{width:100%;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--c1);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:4px;padding:16px;cursor:pointer;transition:.4s;text-transform:uppercase;margin-top:8px;position:relative;}
.submit:hover{border-color:var(--c1);background:rgba(255,255,255,.03);box-shadow:0 0 30px rgba(255,255,255,.06);}
.submit:disabled{opacity:.3;pointer-events:none;}

/* Message */
.msg{font-family:'IBM Plex Mono',monospace;font-size:10px;text-align:center;margin-top:12px;min-height:16px;transition:.3s;letter-spacing:1px;}
.msg.error{color:#ff4466;}
.msg.ok{color:#66ffaa;}

/* Browse link */
.browse{text-align:center;margin-top:28px;}
.browse a{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--c3);letter-spacing:3px;text-decoration:none;text-transform:uppercase;transition:.3s;opacity:.5;}
.browse a:hover{color:var(--c1);opacity:1;}

/* Footer */
.footer{text-align:center;margin-top:40px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--c3);opacity:.3;letter-spacing:3px;text-transform:uppercase;}

/* Spinner */
.spinner{display:none;text-align:center;padding:20px;}
.spinner.show{display:block;}
.spinner::after{content:'';display:inline-block;width:6px;height:6px;background:var(--c1);transform:rotate(45deg);animation:sp 1s ease-in-out infinite;}
@keyframes sp{0%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(225deg) scale(.6);opacity:.3}100%{transform:rotate(405deg) scale(1);opacity:1}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:500px){
  .logo{font-size:52px;letter-spacing:8px;}
  .subtitle{font-size:9px;letter-spacing:4px;}
  .auth{padding:28px 24px;}
  .field-input{font-size:16px;} /* iOS zoom 방지 */
}
</style>
</head>
<body>

<!-- Loading -->
<div class="ld" id="ld">
    <div class="ld-logo">ARCH</div>
    <div class="ld-text" id="ldText">AEGIS SYSTEM INITIALIZING</div>
    <div class="ld-bar"></div>
</div>

<!-- Background -->
<div class="stardust"></div>
<div class="amb amb-1"></div>
<div class="amb amb-2"></div>

<!-- Main -->
<div class="main" id="main">
    <div class="header">
        <div class="logo">ARCH</div>
        <div class="subtitle">AEGIS SYSTEM</div>
        <div class="sys-msg">AGENT PROFILE CLASSIFIED // INSTALL LOADING</div>
    </div>

    <div class="auth">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">ACCESS</button>
            <button class="tab" onclick="switchTab('signup')">REGISTER</button>
        </div>

        <!-- Login Form -->
        <div class="form" id="loginForm">
            <div class="field">
                <div class="field-label">EMAIL</div>
                <input class="field-input" type="email" id="loginEmail" placeholder="agent@aegis-system.cloud">
            </div>
            <div class="field">
                <div class="field-label">PASSWORD</div>
                <input class="field-input" type="password" id="loginPw" placeholder="••••••••">
            </div>
            <button class="submit" onclick="handleLogin()">CONNECT</button>
            <div class="spinner" id="loginSpinner"></div>
            <div class="msg" id="loginMsg"></div>
        </div>

        <!-- Signup Form -->
        <div class="form hide" id="signupForm">
            <div class="field">
                <div class="field-label">EMAIL</div>
                <input class="field-input" type="email" id="signupEmail" placeholder="agent@aegis-system.cloud">
            </div>
            <div class="field">
                <div class="field-label">PASSWORD</div>
                <input class="field-input" type="password" id="signupPw" placeholder="6자 이상">
            </div>
            <div class="nick-field">
                <div class="field-label">CODENAME <span style="opacity:.4;font-size:7px;letter-spacing:1px;">닉네임</span></div>
                <input class="field-input" type="text" id="signupNick" placeholder="Your agent codename">
            </div>
            <button class="submit" onclick="handleSignup()">INITIALIZE</button>
            <div class="spinner" id="signupSpinner"></div>
            <div class="msg" id="signupMsg"></div>
        </div>
    </div>

    <div class="browse">
        <a href="#">BROWSE AS VISITOR ›</a>
    </div>

    <div class="footer">© 2026 AEGIS SYSTEM — ALL RIGHTS RESERVED</div>
</div>

<script>
// ═══ Loading Animation ═══
const ldSteps = [
    {text:'AEGIS SYSTEM INITIALIZING', delay:0},
    {text:'LOADING PROFILE MODULE', delay:600},
    {text:'VERIFYING CREDENTIALS', delay:1200},
    {text:'INSTALLATION COMPLETE', delay:1800}
];
ldSteps.forEach(s=>{
    setTimeout(()=>{document.getElementById('ldText').textContent=s.text;},s.delay);
});
setTimeout(()=>{
    document.getElementById('ld').classList.add('hide');
    document.getElementById('main').classList.add('show');
},2400);

// ═══ Tab Switch ═══
function switchTab(tab){
    document.querySelectorAll('.tab').forEach((t,i)=>{
        t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('loginForm').classList.toggle('hide', tab!=='login');
    document.getElementById('signupForm').classList.toggle('hide', tab!=='signup');
    // Clear messages
    document.querySelectorAll('.msg').forEach(m=>m.textContent='');
}

// ═══ Auth Handlers (Supabase 연동 준비) ═══
// TODO: Supabase 연동 시 아래 주석 해제
// const SUPABASE_URL = 'YOUR_SUPABASE_URL';
// const SUPABASE_KEY = 'YOUR_SUPABASE_KEY';
// const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function handleLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const pw = document.getElementById('loginPw').value;
    const msg = document.getElementById('loginMsg');
    
    if(!email||!pw){msg.className='msg error';msg.textContent='INPUT REQUIRED';return;}
    
    msg.className='msg';msg.textContent='';
    document.getElementById('loginSpinner').classList.add('show');
    
    // TODO: Supabase 연동
    // const {data, error} = await _supabase.auth.signInWithPassword({email, password:pw});
    // if(error){msg.className='msg error';msg.textContent=error.message;}
    // else{window.location.href='dashboard.html';}
    
    // Demo mode (Supabase 연동 전)
    setTimeout(()=>{
        document.getElementById('loginSpinner').classList.remove('show');
        msg.className='msg ok';
        msg.textContent='CONNECTION ESTABLISHED — REDIRECTING...';
        setTimeout(()=>{msg.textContent='[ DEMO MODE — SUPABASE 미연동 ]';msg.className='msg';},1500);
    },1000);
}

async function handleSignup(){
    const email = document.getElementById('signupEmail').value.trim();
    const pw = document.getElementById('signupPw').value;
    const nick = document.getElementById('signupNick').value.trim();
    const msg = document.getElementById('signupMsg');
    
    if(!email||!pw||!nick){msg.className='msg error';msg.textContent='ALL FIELDS REQUIRED';return;}
    if(pw.length<6){msg.className='msg error';msg.textContent='PASSWORD: MIN 6 CHARACTERS';return;}
    
    msg.className='msg';msg.textContent='';
    document.getElementById('signupSpinner').classList.add('show');
    
    // TODO: Supabase 연동
    // const {data, error} = await _supabase.auth.signUp({email, password:pw, options:{data:{nickname:nick}}});
    // if(error){msg.className='msg error';msg.textContent=error.message;}
    // else{msg.className='msg ok';msg.textContent='VERIFICATION EMAIL SENT';}
    
    // Demo mode
    setTimeout(()=>{
        document.getElementById('signupSpinner').classList.remove('show');
        msg.className='msg ok';
        msg.textContent='AGENT REGISTERED — CHECK EMAIL';
        setTimeout(()=>{msg.textContent='[ DEMO MODE — SUPABASE 미연동 ]';msg.className='msg';},1500);
    },1000);
}

// Enter key support
document.querySelectorAll('.field-input').forEach(input=>{
    input.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
            const form = input.closest('.form');
            form.querySelector('.submit').click();
        }
    });
});
</script>
</body>
</html>
